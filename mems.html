  <script>
    function wrapText(ctx, text, maxWidth) {
  const words = text.toUpperCase().split(" ");
  const lines = [];
  let line = "";

  for (let i = 0; i < words.length; i++) {
    const testLine = line + words[i] + " ";

    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
      lines.push(line.trim());
      line = words[i] + " ";
    } else {
      line = testLine;
    }
  }

  lines.push(line.trim());
  return lines;
}

function drawMemeText(ctx, text, x, y, canvasWidth, canvasHeight, position) {
  if (!text) return;

  const maxWidth = canvasWidth * 0.9;
  const maxTextHeight = canvasHeight * 0.26;

  let fontSize = Math.max(90, canvasWidth * 0.13);
  let lines = [];

  while (fontSize > 34) {
    ctx.font = `900 ${fontSize}px Impact, Arial Black, Arial`;
    lines = wrapText(ctx, text, maxWidth);

    const totalHeight = lines.length * fontSize * 1.08;

    if (totalHeight <= maxTextHeight) break;

    fontSize -= 6;
  }

  ctx.font = `900 ${fontSize}px Impact, Arial Black, Arial`;
  ctx.textAlign = "center";
  ctx.fillStyle = "white";
  ctx.strokeStyle = "black";
  ctx.lineWidth = fontSize * 0.18;

  const lineHeight = fontSize * 1.08;
  const totalHeight = lines.length * lineHeight;

  let startY;

  if (position === "top") {
    startY = canvasHeight * 0.12;
  } else {
    startY = canvasHeight - totalHeight - canvasHeight * 0.01;
  }

  lines.forEach((lineText, index) => {
    const lineY = startY + index * lineHeight;
    ctx.strokeText(lineText, x, lineY);
    ctx.fillText(lineText, x, lineY);
  });
}

function drawWatermark(ctx, canvasWidth, canvasHeight) {
  const text1 = "$EMAI ⚡ AI Meme Generator";
  const text2 = "emaitoken.io";
  const fontSize = Math.max(22, canvasWidth * 0.028);

  ctx.save();

  ctx.font = `700 ${fontSize}px Arial`;
  ctx.textAlign = "right";
  ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
  ctx.strokeStyle = "rgba(0, 0, 0, 0.55)";
  ctx.lineWidth = fontSize * 0.12;

  const x = canvasWidth - canvasWidth * 0.03;
  const y = canvasHeight - canvasHeight * 0.025;

  ctx.strokeText(text1, x, y - fontSize * 0.55);
  ctx.fillText(text1, x, y - fontSize * 0.55);

  ctx.strokeText(text2, x, y + fontSize * 0.45);
  ctx.fillText(text2, x, y + fontSize * 0.45);

  ctx.restore();
}
    function generateMeme() {
      const imgFile = document.getElementById("memeImage").files[0];
      const topText = document.getElementById("topText").value;
      const bottomText = document.getElementById("bottomText").value;
      const output = document.getElementById("output");

      if (!imgFile) {
        output.innerHTML = "<p>Please upload an image first.</p>";
        return;
      }

      if (!topText && !bottomText) {
        output.innerHTML = "<p>Please enter top or bottom text.</p>";
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        const img = new Image();

        img.onload = function() {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          canvas.width = img.width;
          canvas.height = img.height;

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          drawMemeText(ctx, topText, canvas.width / 2, 0, canvas.width, canvas.height, "top");
          drawMemeText(ctx, bottomText, canvas.width / 2, 0, canvas.width, canvas.height, "bottom");
          drawWatermark(ctx, canvas.width, canvas.height);

          output.innerHTML = "";
          output.appendChild(canvas);

          document.getElementById("memeActions").style.display = "flex";
          document.getElementById("buyBox").style.display = "block";
        };

        img.src = e.target.result;
      };

      reader.readAsDataURL(imgFile);
    }

    function downloadMeme() {
      const canvas = document.querySelector("#output canvas");
      if (!canvas) return;

      const link = document.createElement("a");
      link.download = "emai-meme.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function shareOnX() {
      const text = encodeURIComponent(
      "I just created an AI meme with $EMAI 🤖🔥\n\nCreate yours here: https://emaitoken.io/mems.html\n\n#EMAI #AI #Memecoin #Base"
  );

  window.open(`https://twitter.com/intent/tweet?text=${text}`, "_blank");
}

}
